name: Daily news update

on:
  schedule:
    - cron: '0 21 * * *'   # 06:00 JST (21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install gTTS
      - name: Fetch & build news
        run: python scripts/update_news.py
      - name: Commit if changed
        run: |
          git config user.name "artikula-bot"
          git config user.email "artikula-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: daily news update ($(date -u +%F))"
            git push
          fi
