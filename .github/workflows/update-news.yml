name: Daily news update

on:
  schedule:
    - cron: '0 21 * * *'   # 06:00 JST (21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: news-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install gTTS
      - name: Fetch & build news
        run: python scripts/update_news.py
      - name: Commit if changed
        id: commit
        run: |
          git config user.name "artikula-bot"
          git config user.email "artikula-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: daily news update ($(TZ=Asia/Tokyo date +%F))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
